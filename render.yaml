services:
  # React SPA (Create React App + React Router)
  - type: web
    name: reactjs-example
    runtime: static
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    branch: master
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_GITHUB_TOKEN
        sync: false